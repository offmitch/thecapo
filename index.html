<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>The Capo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- Three.js Background -->
    <canvas id="bg"></canvas>

    <div class="app">
      <h1>The Capo</h1>
      <p>Find music that matches your mood</p>

      <input type="text" id="input" placeholder="Enter a song or mood" />
      <button onclick="getRecommendation()">Search</button>

      <div class="result" id="result"></div>
    </div>

    <script>
      async function getRecommendation() {
        const input = document.getElementById("input").value;
        const resultDiv = document.getElementById("result");

        if (!input) {
          resultDiv.innerText = "Please enter something.";
          return;
        }

        resultDiv.innerText = "Loading...";

        try {
          const response = await fetch(
            `http://localhost:8080/api/recommend?song=${input}`,
          );

          const data = await response.json();

          resultDiv.innerText = data.recommendation || "No result found.";
        } catch (error) {
          resultDiv.innerText = "Error connecting to server.";
        }
      }
    </script>

    <!-- Three.js (basic background placeholder) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script>
      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(
        75,
        window.innerWidth / window.innerHeight,
        0.1,
        1000,
      );
      const renderer = new THREE.WebGLRenderer({
        canvas: document.getElementById("bg"),
      });

      renderer.setSize(window.innerWidth, window.innerHeight);
      camera.position.z = 5;

      const geometry = new THREE.TorusGeometry(1, 0.3, 16, 100);
      const material = new THREE.MeshBasicMaterial({ wireframe: true });
      const torus = new THREE.Mesh(geometry, material);

      scene.add(torus);

      function animate() {
        requestAnimationFrame(animate);

        torus.rotation.x += 0.01;
        torus.rotation.y += 0.01;

        renderer.render(scene, camera);
      }

      animate();
    </script>
  </body>
</html>
